name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/api && npx prisma generate

      - name: Lint
        run: pnpm lint || true

      - name: Type check
        run: pnpm type-check || true

  deploy:
    name: Deploy to Mac Server
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check deployment configuration
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
          MAC_SSH_KEY: ${{ secrets.MAC_SSH_KEY }}
          MAC_HOST: ${{ vars.MAC_HOST }}
          MAC_USERNAME: ${{ vars.MAC_USERNAME }}
          MAC_DEPLOY_PATH: ${{ vars.MAC_DEPLOY_PATH }}
        run: |
          missing=0
          for name in TS_OAUTH_CLIENT_ID TS_OAUTH_SECRET MAC_SSH_KEY MAC_HOST MAC_USERNAME MAC_DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              missing=1
            fi
          done
          exit "$missing"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify Tailscale connectivity
        run: |
          tailscale status
          tailscale ping --c 1 --until-direct=false "${{ vars.MAC_HOST }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.MAC_HOST }}
          username: ${{ vars.MAC_USERNAME }}
          key: ${{ secrets.MAC_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"

            cd "${{ vars.MAC_DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            
            # 환경 변수 확인
            if [ ! -f .env ]; then
              echo "Error: .env file not found"
              exit 1
            fi
            echo ".env file found"

            # ENCRYPTION_KEY is required for admin-managed API keys.
            # Generate it once if missing/invalid, then keep it stable for future decrypts.
            echo "Checking ENCRYPTION_KEY"
            if grep -Eq '^ENCRYPTION_KEY="?[0-9a-fA-F]{64}"?$' .env; then
              echo "ENCRYPTION_KEY is configured"
            else
              new_encryption_key="$(openssl rand -hex 32)"
              if grep -qE '^ENCRYPTION_KEY=' .env; then
                sed -i.bak "s/^ENCRYPTION_KEY=.*/ENCRYPTION_KEY=$new_encryption_key/" .env
                rm -f .env.bak
              else
                printf '\nENCRYPTION_KEY=%s\n' "$new_encryption_key" >> .env
              fi
              echo "Generated ENCRYPTION_KEY in .env"
            fi
            docker compose config >/dev/null
            echo "Docker Compose config validated"

            # Docker 이미지 빌드 및 실행
            echo "Stopping existing containers"
            docker compose down
            echo "Building Docker images"
            docker compose build --no-cache
            echo "Starting containers"
            docker compose up -d
            
            # 상태 확인
            sleep 10
            docker compose ps
            
            # 불필요한 이미지 정리
            docker image prune -f
