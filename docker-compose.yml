services:
  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:16-alpine
    container_name: mockup-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mockup
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"  # 🚨 보안: 외부 노출 금지 - 내부 Docker 네트워크만 사용
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d mockup']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 캐시 및 작업 큐
  redis:
    image: redis:7-alpine
    container_name: mockup-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # ports:
    #   - "6379:6379"  # 🚨 보안: 외부 노출 금지 - 내부 Docker 네트워크만 사용
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # DB 마이그레이션 (한 번만 실행)
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: migrate
    container_name: mockup-migrate
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/mockup?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  # Fastify API 서버
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mockup-api
    ports:
      - '100.69.75.47:4000:4000' # 🔒 Tailscale VPN IP로만 바인딩
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:password@postgres:5432/mockup?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-1d}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-7d}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - UPLOAD_DIR=/app/data
      # CORS 허용 origin (프론트엔드 URL) - Tailscale 사용으로 모든 origin 허용
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # 작업 처리 워커
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.worker
    container_name: mockup-worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:password@postgres:5432/mockup?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-1d}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-7d}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - UPLOAD_DIR=/app/data
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Next.js 프론트엔드
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Tailscale VPN IP로 설정
        # 로컬 개발: http://localhost:4000
        # Tailscale 접속: http://100.69.75.47:4000
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://100.69.75.47:4000}
    container_name: mockup-web
    ports:
      - '100.69.75.47:3000:3000' # 🔒 Tailscale VPN IP로만 바인딩
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  app_data:
